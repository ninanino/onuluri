<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘,우리 - 서울 이벤트</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#e8e8f0; font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif; display:flex; justify-content:center; min-height:100vh; }
    ::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState}=React;
    const CS={"팝업스토어":{bg:"#6c63ff",light:"#ede9ff",emoji:"🛍️"},"전시":{bg:"#2196F3",light:"#e3f2fd",emoji:"🎨"},"뮤지컬":{bg:"#e91e63",light:"#fce4ec",emoji:"🎭"},"공연":{bg:"#9c27b0",light:"#f3e5f5",emoji:"🎵"},"콘서트":{bg:"#ff5722",light:"#fbe9e7",emoji:"🎤"},"체험전시":{bg:"#009688",light:"#e0f2f1",emoji:"🌀"},"기타":{bg:"#607d8b",light:"#eceff1",emoji:"📌"}};
    const gs=(c)=>CS[c]||CS["기타"];
    const E=[
      {id:1,title:"최재은: 약속",start:"2025-12-23",end:"2026-04-05",place:"서울시립미술관 서소문본관",cat:"전시",price:"무료"},
      {id:2,title:"Electric Shock",start:"2025-12-04",end:"2026-03-22",place:"북서울미술관",cat:"전시",price:"무료"},
      {id:3,title:"Proximities",start:"2025-12-16",end:"2026-03-29",place:"서울시립미술관",cat:"전시",price:"무료"},
      {id:4,title:"뮤지컬 킨키부츠",start:"2026-01-01",end:"2026-03-29",place:"샬롯씨어터",cat:"뮤지컬",price:"유료"},
      {id:5,title:"뮤지컬 긴긴밤",start:"2026-01-01",end:"2026-03-29",place:"링크아트센터",cat:"뮤지컬",price:"유료"},
      {id:6,title:"센과치히로 오리지널투어",start:"2026-01-01",end:"2026-03-22",place:"예술의전당",cat:"공연",price:"유료"},
      {id:7,title:"어디있니 윌리?",start:"2026-01-01",end:"2026-04-05",place:"더서울라이티움",cat:"체험전시",price:"유료"},
      {id:8,title:"블랙핑크 DEADLINE 팝업",start:"2026-03-01",end:"2026-03-31",place:"무신사스탠다드 성수",cat:"팝업스토어",price:"무료"},
      {id:9,title:"나이키X스킴스 팝업",start:"2026-03-01",end:"2026-03-31",place:"성수동",cat:"팝업스토어",price:"무료"},
      {id:10,title:"갤럭시 S26 출시 팝업",start:"2026-03-01",end:"2026-03-31",place:"성수동",cat:"팝업스토어",price:"무료"},
      {id:11,title:"백설공주 팝업",start:"2026-03-08",end:"2026-03-16",place:"더현대서울 6층",cat:"팝업스토어",price:"무료"},
      {id:12,title:"LiSA 내한공연",start:"2026-08-01",end:"2026-08-02",place:"서울올림픽홀",cat:"콘서트",price:"유료"},
    ];
    const fm=(s)=>{if(!s)return"";const d=new Date(s);return isNaN(d)?s:(d.getMonth()+1)+"/"+d.getDate();};
    const dd=(e)=>{if(!e)return null;const d=Math.ceil((new Date(e)-new Date())/86400000);if(d<0)return null;return d===0?"D-day":"D-"+d;};
    const FL=["전체","팝업스토어","전시","뮤지컬","공연","콘서트","체험전시"];
    const TB=[{i:"🏠",l:"홈"},{i:"🔍",l:"탐색"},{i:"🔖",l:"저장"},{i:"👤",l:"내정보"}];
    function App(){
      const[tag,setTag]=useState("전체");const[sel,setSel]=useState(null);const[tab,setTab]=useState(0);
      const list=tag==="전체"?E:E.filter(e=>e.cat===tag);
      if(sel){const cs=gs(sel.cat);const d=dd(sel.end);return(
        <div style={{width:390,height:844,borderRadius:40,overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,.25)",background:"#fff",display:"flex",flexDirection:"column",margin:"40px auto"}}>
          <div style={{background:"linear-gradient(160deg,"+cs.bg+","+cs.bg+"aa)",padding:"54px 20px 28px",position:"relative",flexShrink:0}}>
            <button onClick={()=>setSel(null)} style={{position:"absolute",top:18,left:16,background:"rgba(255,255,255,.25)",border:"none",borderRadius:12,padding:"8px 14px",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>{"<- 뒤로"}</button>
            {d&&<span style={{position:"absolute",top:18,right:16,background:"#fff",color:cs.bg,borderRadius:20,padding:"6px 14px",fontWeight:800,fontSize:12}}>{d}</span>}
            <div style={{fontSize:52,textAlign:"center",marginBottom:8}}>{cs.emoji}</div>
            <span style={{background:"rgba(255,255,255,.25)",borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:700,color:"#fff"}}>{sel.cat}</span>
            <h1 style={{color:"#fff",fontWeight:800,fontSize:21,lineHeight:1.3,marginTop:10}}>{sel.title}</h1>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"20px 16px"}}>
            {[["📅","기간",(sel.start&&sel.end)?sel.start+" ~ "+sel.end:sel.start||"-"],["📍","장소",sel.place||"-"],["💰","가격",sel.price||"정보 없음"]].map(([ic,lb,v])=>(
              <div key={lb} style={{background:"#f8f8fc",borderRadius:16,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"flex-start",gap:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{ic}</span>
                <div><div style={{fontSize:11,color:"#888",fontWeight:600,marginBottom:2}}>{lb}</div><div style={{fontSize:14,color:"#222",fontWeight:500}}>{v}</div></div>
              </div>
            ))}
          </div>
          <div style={{padding:"12px 16px 30px",display:"flex",gap:10}}>
            <div style={{flex:2,background:"#ddd",color:"#999",borderRadius:16,padding:"15px",textAlign:"center",fontWeight:800,fontSize:15}}>예매 링크 준비 중</div>
            <button style={{flex:1,background:"#f0f0f8",border:"none",borderRadius:16,padding:"15px",fontWeight:800,fontSize:15,cursor:"pointer"}}>{"🔖"}</button>
            <button style={{flex:1,background:"#f0f0f8",border:"none",borderRadius:16,padding:"15px",fontWeight:800,fontSize:15,cursor:"pointer"}}>{"📤"}</button>
          </div>
        </div>
      );}
      return(
        <div style={{width:390,height:844,borderRadius:40,overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,.25)",background:"#fafafc",display:"flex",flexDirection:"column",margin:"40px auto"}}>
          <div style={{padding:"18px 20px 10px",background:"#fff",borderBottom:"1px solid #f0f0f0",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h1 style={{fontSize:24,fontWeight:900,background:"linear-gradient(135deg,#6c63ff,#3bbaf5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{"오늘,우리 ✨"}</h1>
              <span style={{fontSize:12,color:"#aaa"}}>{"서울 📍"}</span>
            </div>
            <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4}}>
              {FL.map(f=>(<button key={f} onClick={()=>setTag(f)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",background:tag===f?"#6c63ff":"#f0f0f8",color:tag===f?"#fff":"#555"}}>{f}</button>))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
            {list.map(e=>{const cs=gs(e.cat);const d=dd(e.end);return(
              <div key={e.id} onClick={()=>setSel(e)} style={{background:"#fff",borderRadius:20,padding:"14px 16px",marginBottom:10,boxShadow:"0 2px 12px rgba(0,0,0,.06)",cursor:"pointer",display:"flex",gap:14,alignItems:"center"}}>
                <div style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,"+cs.bg+"99,"+cs.bg+"44)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{cs.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#222",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
                  <div style={{fontSize:11,color:"#888",marginBottom:5}}>
                    <span style={{background:cs.light,color:cs.bg,borderRadius:8,padding:"2px 7px",fontWeight:700,marginRight:6}}>{e.cat}</span>
                    {e.place&&e.place.split(" ").slice(0,2).join(" ")}
                  </div>
                  <div style={{fontSize:11,color:"#bbb"}}>{fm(e.start)}{e.end?" ~ "+fm(e.end):""}</div>
                </div>
                {d&&<span style={{background:cs.bg+"22",color:cs.bg,borderRadius:12,padding:"4px 8px",fontSize:11,fontWeight:800,flexShrink:0}}>{d}</span>}
              </div>
            );})}
          </div>
          <div style={{background:"#fff",borderTop:"1px solid #f0f0f0",padding:"10px 0 20px",display:"flex",justifyContent:"space-around",flexShrink:0}}>
            {TB.map((t,i)=>(<button key={t.l} onClick={()=>setTab(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer"}}><span style={{fontSize:22}}>{t.i}</span><span style={{fontSize:10,fontWeight:700,color:tab===i?"#6c63ff":"#bbb"}}>{t.l}</span></button>))}
          </div>
        </div>
      );
    }
    ReactDOM.render(<App />,document.getElementById("root"));
  </script>
</body>
</html>
