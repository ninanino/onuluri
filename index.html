<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘,우리</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"><\/script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"><\/script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"><\/script>
  <style>* { margin:0;padding:0;box-sizing:border-box; } body { background:#e8e8f0;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; } ::-webkit-scrollbar{display:none;}<\/style>
<\/head>
<body>
  <div id="root"><\/div>
  <script type="text/babel">
    const {useState,useEffect,useCallback}=React;
    const SHEET_API_URL="https://script.google.com/macros/s/AKfycbzYOURURLHERE/exec";
    const mapEvent=(raw)=>({id:raw.id,title:raw["제목"]||"",start:raw["기간 시작"]||"",end:raw["기간 종료"]||"",place:raw["장소"]||"",category:raw["카테고리"]||"기타",link:raw["링크"]||"",source:raw["출처"]||"",price:raw["가격"]||""});
    const CS={"팝업스토어":{bg:"#6c63ff",light:"#ede9ff",emoji:"🛍️"},"전시":{bg:"#2196F3",light:"#e3f2fd",emoji:"🎨"},"뮤지컬":{bg:"#e91e63",light:"#fce4ec",emoji:"🎭"},"공연":{bg:"#9c27b0",light:"#f3e5f5",emoji:"🎵"},"콘서트":{bg:"#ff5722",light:"#fbe9e7",emoji:"🎤"},"기타":{bg:"#607d8b",light:"#eceff1",emoji:"📌"}};
    const gS=(c)=>CS[c]||Object.entries(CS).find(([k])=>c?.includes(k))?.[1]||CS["기타"];
    const fD=(s)=>{if(!s)return"";const d=new Date(s);if(isNaN(d))return String(s);return(d.getMonth()+1)+"월 "+d.getDate()+"일";};
    const gDd=(end)=>{if(!end)return null;const now=new Date();now.setHours(0,0,0,0);const e=new Date(end);e.setHours(0,0,0,0);const diff=Math.ceil((e-now)/86400000);if(diff<0)return{label:"종료",color:"#aaa"};if(diff===0)return{label:"D-day",color:"#e53935"};if(diff<=7)return{label:"D-"+diff,color:"#ff6b35"};return{label:"D-"+diff,color:"#6c63ff"};};
    function App(){
      const[ev,setEv]=useState([]);const[load,setLoad]=useState(true);const[err,setErr]=useState(null);
      const[tag,setTag]=useState("전체");const[dt,setDt]=useState(null);const[q,setQ]=useState("");const[lu,setLu]=useState(null);
      const get=useCallback(async()=>{setLoad(true);setErr(null);try{const r=await fetch(SHEET_API_URL);if(!r.ok)throw new Error("HTTP "+r.status);const j=await r.json();setEv((j.events||[]).map(mapEvent));setLu(j.updatedAt);}catch(e){setErr("데이터 오류");console.error(e);}finally{setLoad(false);}},[]);
      useEffect(()=>{get();},[get]);
      const tags=["전체",...new Set(ev.map(e=>e.category).filter(Boolean))];
      const fl=ev.filter(e=>(tag==="전체"||e.category===tag)&&(!q||e.title.includes(q)||e.place.includes(q)));
      if(dt){const s=gS(dt.category);const d=gDd(dt.end);return(
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#e8e8f0"}}>
          <div style={{width:390,height:844,borderRadius:40,overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,.25)",display:"flex",flexDirection:"column",overflowY:"auto"}}>
            <div style={{minHeight:220,background:"linear-gradient(160deg,"+s.bg+","+s.bg+"bb)",flexShrink:0,position:"relative",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
              <div style={{padding:"16px 20px"}}><button onClick={()=>setDt(null)} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:20,padding:"8px 16px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>← 목록</button></div>
              <div style={{textAlign:"center",fontSize:64}}>{s.emoji}</div>
              {d&&<div style={{position:"absolute",top:16,right:20,background:d.color,color:"#fff",borderRadius:20,padding:"6px 14px",fontWeight:800,fontSize:12}}>{d.label}</div>}
              <div style={{background:"rgba(0,0,0,.25)",backdropFilter:"blur(12px)",padding:"16px 20px"}}>
                <span style={{background:s.bg,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700}}>{dt.category}</span>
                <div style={{color:"#fff",fontWeight:800,fontSize:18,lineHeight:1.3,marginTop:8}}>{dt.title}</div>
              </div>
            </div>
            <div style={{padding:"20px",flex:1,background:"#fff"}}>
              <div style={{background:s.light,borderRadius:14,padding:"16px",marginBottom:20,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {[["📅",dt.start&&dt.end?fD(dt.start)+"~"+fD(dt.end):fD(dt.start||dt.end)],["📍",dt.place],["💰",dt.price||"확인필요"],["🔗",dt.source]].map(([l,v])=>v?(<div key={l}><div style={{fontSize:10,color:"#999",marginBottom:3}}>{l}</div><div style={{fontWeight:700,fontSize:12}}>{v}</div></div>):null)}
              </div>
              {dt.link&&<a href={dt.link} target="_blank" rel="noreferrer" style={{display:"block",background:s.bg,color:"#fff",borderRadius:12,padding:"14px",fontWeight:800,textAlign:"center",textDecoration:"none"}}>자세히 보기 →</a>}
            </div>
          </div>
        </div>
      );}
      return(
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh",background:"#e8e8f0"}}>
          <div style={{width:390,height:844,borderRadius:40,overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,.25)",display:"flex",flexDirection:"column",background:"#fafafa"}}>
            <div style={{background:"#fff",padding:"14px 20px 12px",borderBottom:"1px solid #f0f0f0",flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h1 style={{margin:0,fontSize:24,fontWeight:900,background:"linear-gradient(135deg,#6c63ff,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>오늘,우리</h1>
                <button onClick={get} style={{background:"#f0f0f0",border:"none",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔄</button>
              </div>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="검색..." style={{width:"100%",background:"#f5f5f5",border:"none",borderRadius:12,padding:"9px 14px",fontSize:13,outline:"none",marginBottom:10}}/>
              <div style={{display:"flex",gap:6,overflowX:"auto"}}>
                {tags.map(t=><button key={t} onClick={()=>setTag(t)} style={{background:tag===t?"#6c63ff":"#f0f0f0",color:tag===t?"#fff":"#555",border:"none",borderRadius:20,padding:"5px 12px",fontWeight:700,fontSize:11,cursor:"pointer",flexShrink:0}}>{t}</button>)}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto"}}>
              {load?(<div style={{textAlign:"center",padding:50,color:"#aaa"}}>⏳ 불러오는 중...</div>):
              err?(<div style={{textAlign:"center",padding:40,color:"#e53935"}}>⚠️ {err}<br/><button onClick={get} style={{marginTop:12,background:"#6c63ff",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",cursor:"pointer"}}>다시시도</button></div>):
              fl.length===0?(<div style={{textAlign:"center",padding:50,color:"#aaa"}}>🔍 결과없음</div>):
              fl.map(e=>{const s=gS(e.category);const d=gDd(e.end);return(
                <div key={e.id} onClick={()=>setDt(e)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#fff",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}}>
                  <div style={{width:60,height:60,borderRadius:12,flexShrink:0,background:"linear-gradient(135deg,"+s.bg+","+s.bg+"88)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{s.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:"#111",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
                    <div style={{fontSize:11,color:"#888",marginBottom:4}}><span style={{color:s.bg,fontWeight:600}}>{e.category}</span>{e.place?" · "+e.place.split(" ").slice(0,2).join(" "):""}</div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:10,color:"#bbb"}}>{e.end?"~"+fD(e.end):fD(e.start)}</span>
                      {d&&<span style={{fontSize:10,fontWeight:800,color:d.color,background:d.color+"18",borderRadius:6,padding:"1px 6px"}}>{d.label}</span>}
                    </div>
                  </div>
                </div>
              );})}
            </div>
            <div style={{background:"#fff",borderTop:"1px solid #f0f0f0",display:"flex",justifyContent:"space-around",padding:"8px 0 16px",flexShrink:0}}>
              {[["🏠","홈"],["🔍","탐색"],["💾","저장"],["👤","내정보"]].map(([i,l])=><button key={l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer"}}><span style={{fontSize:18}}>{i}</span><span style={{fontSize:9,color:l==="홈"?"#6c63ff":"#bbb",fontWeight:l==="홈"?700:400}}>{l}</span></button>)}
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
<\/body>
<\/html>
